<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriCiclo — Ciclo de Produção do Milho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Decorative background blobs -->
  <div class="bg-layer" aria-hidden="true"></div>

  <div class="app-wrapper">

    <!-- ── HEADER / BRAND ── -->
    <header class="header">
      <div class="brand">
        <span class="brand-emblem" aria-hidden="true">🌽</span>
        <div class="brand-info">
          <span class="brand-name">AgriCiclo</span>
          <span class="brand-tagline">Ciclo de Produção do Milho</span>
        </div>
      </div>
    </header>

    <!-- ── PROGRESS BAR ── -->
    <section class="progress-section" aria-label="Progresso das etapas">
      <!-- Connecting line track (behind the dots) -->
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <!-- Step dots (generated by JS) -->
      <div class="progress-steps" id="progressSteps" role="list"></div>
    </section>

    <!-- ── MAIN WIZARD CARD ── -->
    <main class="main-area" role="main">
      <div class="step-card" id="stepCard">
        <!-- Left: SVG illustration (injected by JS) -->
        <div class="card-visual" id="cardVisual" aria-hidden="true"></div>
        <!-- Right: Text content (injected by JS) -->
        <div class="card-body" id="cardBody"></div>
      </div>
    </main>

    <!-- ── NAVIGATION ── -->
    <nav class="nav-bar" role="navigation" aria-label="Navegação entre etapas">
      <button class="btn btn-back" id="btnBack" aria-label="Voltar à etapa anterior">
        <svg class="btn-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 4 6 10 12 16"/></svg>
        Voltar
      </button>

      <div class="step-counter" id="stepCounter" aria-live="polite"></div>

      <button class="btn btn-next" id="btnNext" aria-label="Avançar para a próxima etapa">
        Avançar
        <svg class="btn-icon" id="btnNextIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 4 14 10 8 16"/></svg>
      </button>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
